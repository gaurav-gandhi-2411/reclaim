name: eval

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  safety-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen --all-groups

      # Routed through scripts/git_guard.py with GIT_CONFIG_GLOBAL redirected to a job-scoped
      # temp path — belt-and-suspenders identity for any fixture code that ever grows a
      # `git commit` without -c-scoped identity (evals/fixtures/build_golden_tree.py and
      # tests/test_scanner.py's own git commits are already -c-scoped and need this for
      # nothing). Never writes to a real global config, even here on an ephemeral runner where
      # there's no real profile to protect — the point is that this exact step is safe to copy
      # to a local machine too: without also exporting GIT_CONFIG_GLOBAL, git_guard.py refuses
      # it outright instead of silently clobbering a real developer's identity (see
      # scripts/git_guard.py's docstring for the incident this guards against).
      - name: Configure a SANDBOXED git identity for fixture repos (scripts/git_guard.py)
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}\reclaim-ci-gitconfig
        run: |
          uv run python scripts/git_guard.py config --global user.email "fixture@reclaim.test"
          uv run python scripts/git_guard.py config --global user.name "Reclaim Fixture Builder"

      # Scoped explicitly to the two safety-gate files, not the whole evals/ directory: every
      # other evals/*.py file is a gold-set/operating-point measurement that needs the [ai]
      # extra (torch/PIL/numpy/datasketch/...) to even collect, and this job deliberately does
      # NOT install it — those measurements run in ci.yml's ai-layer-with-extras job instead
      # (`pytest tests/ evals/test_ai_safety_gate.py -v`, extras installed there). Neither
      # safety-gate file needs the ai extra: test_safety_gate.py tests the deterministic
      # engine's SafetyValidator hard gate directly; test_ai_safety_gate.py constructs
      # AICluster/AIClusterMember objects with hardcoded scores to prove the structural
      # recommend-only guarantee — it never runs a real model, so it doesn't need lightgbm/
      # torch/etc. either. Verified: both collect and pass 24/24 with zero ai deps installed.
      - name: Safety gates -- deterministic (test_safety_gate.py) + AI recommend-only (test_ai_safety_gate.py)
        run: uv run pytest evals/test_safety_gate.py evals/test_ai_safety_gate.py -v --junitxml=pytest-results.xml

      - name: Fail if this job collected/ran zero tests
        run: uv run python scripts/check_junit_nonzero.py pytest-results.xml
