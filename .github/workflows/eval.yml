name: eval

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  safety-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen --all-groups

      - name: Configure git identity for fixture repos
        run: |
          git config --global user.email "fixture@reclaim.test"
          git config --global user.name "Reclaim Fixture Builder"

      - name: SafetyValidator hard gate (evals/test_safety_gate.py)
        run: uv run pytest evals/ -v
