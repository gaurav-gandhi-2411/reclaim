name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen --all-groups

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest (fast unit tests — SafetyValidator hard gate runs in eval.yml)
        run: uv run pytest --cov --cov-report=term-missing

  ai-layer-with-extras:
    # Hard Gate 3 (reclaim-ai-features-spec.md §8/§0.3): proves the "ai extras installed"
    # profile in a clean environment this session doesn't control by hand — complements
    # lint-and-test above, which runs WITHOUT --extra ai and proves the core tool installs
    # and passes everything without it (tests/test_ai_optional_extra.py also proves that
    # profile directly via simulated import-blocking, so it's covered even in this job).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync dependencies (with the ai extra)
        run: uv sync --frozen --all-groups --extra ai

      - name: Ruff check
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest + AI safety gate
        run: uv run pytest tests/ evals/test_ai_safety_gate.py -v

  frontend-xss-regression:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install jsdom
        working-directory: tests/frontend
        run: npm ci --no-audit --no-fund

      - name: DOM-level XSS regression tests (dashboard filename rendering)
        working-directory: tests/frontend
        run: npm test

  pip-audit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      # --no-emit-project: audit third-party dependencies only, not the local, unpublished
      # `reclaim` package itself (which has no PyPI/OSV advisory feed to check against).
      - name: Export locked dependencies
        run: uv export --frozen --no-hashes --no-emit-project -o requirements-audit.txt

      # pip-audit has no reliable, universally-populated CVSS severity field across its OSV-
      # sourced advisories to filter on, so this fails on ANY known vulnerability — strictly
      # stronger than "fail on high-severity only" (a superset that necessarily includes every
      # high-severity finding), not a looser substitute for it.
      - name: pip-audit (fails the build on any known vulnerability)
        run: uvx pip-audit --desc -r requirements-audit.txt
