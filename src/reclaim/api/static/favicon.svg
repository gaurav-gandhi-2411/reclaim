<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Reclaim">
  <!--
    Reclaim mark: "a block lifted away from a filled square." The whole square starts clay/
    terracotta (occupied ground); a chunk in the bottom-right has already been cleared, revealing
    pine green underneath. The small clay block floating top-right, outlined in the sand gap
    color, is the piece mid-lift — still occupied, but on its way out. Same geometry as
    logo.svg (this is the tab-icon-sized copy); packaging/build_brand_assets.py re-draws it with
    flat rectangles so the packaged .ico/.bmp/.png brand assets match exactly.
    Literal hex values (not CSS custom properties) because a favicon is loaded as a standalone
    document outside the app's stylesheet cascade; these mirror tokens.css's
    rc-cat-dev-artifacts, rc-brand, and rc-bg custom properties exactly (light mode) with a
    prefers-color-scheme override for the dark-mode tab-bar case.
  -->
  <style>
    .rc-clay { fill: #c1512b; }
    .rc-green { fill: #2f6b52; }
    .rc-lift { fill: #c1512b; stroke: #faf6f0; stroke-width: 2; }
    @media (prefers-color-scheme: dark) {
      .rc-clay { fill: #d76b40; }
      .rc-green { fill: #4fae82; }
      .rc-lift { fill: #d76b40; stroke: #1c1815; }
    }
  </style>
  <clipPath id="rc-mark-clip">
    <rect width="32" height="32" rx="7" />
  </clipPath>
  <g clip-path="url(#rc-mark-clip)">
    <rect class="rc-clay" x="0" y="0" width="32" height="32" />
    <rect class="rc-green" x="11" y="11" width="21" height="21" />
    <rect class="rc-lift" x="15" y="1" width="14" height="12" />
  </g>
</svg>
